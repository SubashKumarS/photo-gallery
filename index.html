<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Photo Gallery</title>

<!-- CSS File -->
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Photo Gallery 📸</h1>

    <h2>Enter the number of photos</h2>

    <!-- Input -->
    <input 
        type="number" 
        id="input" 
        class="input" 
        placeholder="Enter number (1–10)" 
        min="1" 
        max="10"
    >

    <!-- Error Message -->
    <small class="errorMessage" id="errorMessage"></small>

    <!-- Button -->
    <button class="btn" id="btn">Get Photos</button>

    <!-- Gallery (Images will be added by JavaScript) -->
    <div class="gallery" id="gallery"></div>
</div>

<!-- JavaScript File -->
<script src="index.js"></script>

</body>
</html>
